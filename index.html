<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Slide</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="./styles.css?v=20260519-video-export" />
  </head>
  <body>
    <div class="app-frame">
      <header class="top-menu" aria-label="상단 메뉴">
        <div class="brand">
          <h1>Simple Slide</h1>
          <input id="projectNameInput" class="project-name-input" type="text" value="Untitled" aria-label="프로젝트 이름" />
        </div>
        <div class="top-actions" aria-label="빠른 작업">
          <span class="menu-group" aria-label="프로젝트">
            <button id="newProject" type="button">New</button>
            <button id="projectLibraryButton" type="button">Projects</button>
            <button id="saveProject" type="button">Save Project</button>
            <button id="openProject" type="button">Import Project</button>
          </span>
          <span class="menu-divider native-divider" aria-hidden="true"></span>
          <span class="menu-group" aria-label="삽입">
            <button id="pasteImage" type="button">Paste Image</button>
            <button id="addTextBox" type="button">Add Text Box</button>
          </span>
          <span class="menu-divider" aria-hidden="true"></span>
          <span class="menu-group" aria-label="내보내기">
            <button id="savePng" type="button">Save PNG</button>
            <button id="exportMp4" type="button">Export MP4</button>
          </span>
          <input id="projectFileInput" type="file" accept=".simpleslide.json,application/json,.json" hidden />
          <input id="videoFileInput" type="file" accept="video/mp4,video/quicktime,video/webm,.mp4,.mov,.m4v,.webm" hidden />
        </div>
      </header>

      <main class="app-shell">
        <aside class="toolbar" aria-label="도구">

        <section class="panel" aria-labelledby="canvas-settings-title">
          <h2 id="canvas-settings-title">Canvas</h2>
          <label>
            <span>Width</span>
            <input id="canvasWidth" type="number" min="80" max="4096" step="10" value="1280" />
          </label>
          <label>
            <span>Height</span>
            <input id="canvasHeight" type="number" min="80" max="4096" step="10" value="720" />
          </label>
          <label>
            <span>Color</span>
            <input id="canvasColor" type="color" value="#ffffff" />
          </label>
          <label>
            <span>Theme</span>
            <div id="colorPresets" class="color-preset-buttons" role="group" aria-label="색상 조합">
              <button type="button" data-color-preset="light" class="is-active">White</button>
              <button type="button" data-color-preset="dark">Black</button>
            </div>
          </label>
          <button id="applyCanvas" type="button">Apply</button>
        </section>

        <section class="panel" aria-labelledby="draw-title">
          <h2 id="draw-title">Draw</h2>
          <div id="drawTools" class="draw-tool-buttons" role="group" aria-label="그리기 도구">
            <button type="button" data-draw-tool="select" class="is-active">Select</button>
            <button type="button" data-draw-tool="line">Line</button>
            <button type="button" data-draw-tool="arrow">Arrow</button>
            <button type="button" data-draw-tool="pen">Pen</button>
          </div>
          <label>
            <span>Stroke</span>
            <input id="strokeColor" type="color" value="#111827" />
          </label>
          <label>
            <span>Width</span>
            <input id="strokeWidth" type="number" min="1" max="32" step="1" value="4" />
          </label>
        </section>

        <section class="panel" aria-labelledby="slide-video-title">
          <h2 id="slide-video-title">Slide Video</h2>
          <div class="video-source-actions">
            <button id="chooseSlideVideo" type="button">Choose</button>
            <button id="clearSlideVideo" type="button">Remove</button>
          </div>
          <div id="slideVideoInfo" class="inline-info">No video</div>
        </section>

        <section class="panel" aria-labelledby="mp4-export-title">
          <h2 id="mp4-export-title">MP4 Export</h2>
          <label>
            <span>API Key</span>
            <input id="ttsApiKey" type="password" autocomplete="off" placeholder="OPENAI_API_KEY" />
          </label>
          <label>
            <span>Model</span>
            <select id="ttsModel">
              <option value="gpt-4o-mini-tts">gpt-4o-mini-tts</option>
              <option value="tts-1">tts-1</option>
              <option value="tts-1-hd">tts-1-hd</option>
            </select>
          </label>
          <label>
            <span>Voice</span>
            <select id="ttsVoice">
              <option value="marin">marin</option>
              <option value="cedar">cedar</option>
              <option value="coral">coral</option>
              <option value="nova">nova</option>
              <option value="alloy">alloy</option>
              <option value="sage">sage</option>
              <option value="verse">verse</option>
              <option value="shimmer">shimmer</option>
              <option value="onyx">onyx</option>
              <option value="echo">echo</option>
              <option value="fable">fable</option>
              <option value="ash">ash</option>
              <option value="ballad">ballad</option>
            </select>
          </label>
          <label>
            <span>Speed</span>
            <input id="ttsSpeed" type="number" min="0.25" max="4" step="0.05" value="1" />
          </label>
          <label>
            <span>Tone</span>
            <input id="ttsInstructions" type="text" placeholder="차분하게 읽기" />
          </label>
          <div id="exportStatus" class="inline-info">Ready</div>
        </section>

        <section class="panel selected-panel" aria-labelledby="selected-title">
          <div class="panel-title-row">
            <h2 id="selected-title">Selected</h2>
            <span id="selectionSummary" class="panel-summary">None</span>
          </div>
          <label>
            <span>X</span>
            <input id="selectedX" type="number" step="1" />
          </label>
          <label>
            <span>Y</span>
            <input id="selectedY" type="number" step="1" />
          </label>
          <label>
            <span>W</span>
            <input id="selectedW" type="number" min="8" step="1" />
          </label>
          <label>
            <span>H</span>
            <input id="selectedH" type="number" min="8" step="1" />
          </label>
          <label>
            <span>Rotate</span>
            <input id="selectedR" type="number" step="1" />
          </label>
          <label>
            <span>Size</span>
            <div id="selectedTextSize" class="text-size-buttons" role="group" aria-label="텍스트 크기">
              <button type="button" data-text-size="h4">H4</button>
              <button type="button" data-text-size="h3" class="is-active">H3</button>
              <button type="button" data-text-size="h2">H2</button>
              <button type="button" data-text-size="h1">H1</button>
            </div>
          </label>
          <label>
            <span>Color</span>
            <input id="selectedTextColor" type="color" value="#111827" />
          </label>
          <div class="align-controls" aria-label="선택 정렬">
            <button type="button" data-align="left">Left</button>
            <button type="button" data-align="center">Center</button>
            <button type="button" data-align="right">Right</button>
            <button type="button" data-align="top">Top</button>
            <button type="button" data-align="middle">Middle</button>
            <button type="button" data-align="bottom">Bottom</button>
          </div>
          <div class="arrange-controls" aria-label="레이어 순서">
            <button id="sendBackward" type="button">Backward</button>
            <button id="bringForward" type="button">Forward</button>
            <button id="sendToBack" type="button">Back</button>
            <button id="bringToFront" type="button">Front</button>
          </div>
          <div class="selected-actions">
            <button id="duplicateSelected" type="button">Duplicate</button>
            <button id="editSelectedText" type="button">Edit Text</button>
            <button id="deleteSelected" class="danger" type="button">Delete</button>
          </div>
        </section>
      </aside>

      <section class="workspace" aria-label="작업 영역">
        <div class="canvas-scroll">
          <div id="canvas" class="canvas" tabindex="0" aria-label="편집 캔버스">
            <video id="slideVideo" class="canvas-video" muted loop playsinline></video>
          </div>
        </div>
        <section class="slide-notes" aria-label="슬라이드 노트">
          <div class="slide-notes-header">
            <h2>Notes</h2>
            <span>Current slide</span>
          </div>
          <textarea id="slideNotes" spellcheck="false" placeholder="이 슬라이드에 대한 발표 메모나 설명을 적어두세요."></textarea>
        </section>
      </section>

      <aside class="slides-sidebar" aria-label="슬라이드">
        <div class="slides-header">
          <div>
            <h2>Slides</h2>
            <span id="slideSummary" class="slide-summary">1 / 1</span>
          </div>
          <button id="duplicateSlide" type="button">Duplicate</button>
        </div>
        <div id="slideList" class="slide-list"></div>
        <div class="slide-footer-actions">
          <button id="deleteSlide" class="danger" type="button">Delete</button>
          <button id="addSlide" class="add-slide-button" type="button">Add Slide</button>
        </div>
      </aside>
      </main>

      <footer class="status-bar" aria-label="상태">
        <span id="saveStateText">Ready</span>
        <span id="selectionStateText">No selection</span>
        <span id="slideStateText">Slide 1 of 1</span>
        <span id="canvasStateText">1280 x 720 · 100%</span>
      </footer>
    </div>

    <template id="imageTemplate">
      <div class="object image-object" data-type="image">
        <img alt="" draggable="false" />
        <div class="selection-box" aria-hidden="true">
          <span class="handle rotate" data-handle="rotate"></span>
          <span class="handle nw" data-handle="nw"></span>
          <span class="handle ne" data-handle="ne"></span>
          <span class="handle sw" data-handle="sw"></span>
          <span class="handle se" data-handle="se"></span>
        </div>
      </div>
    </template>

    <template id="textTemplate">
      <div class="object text-object" data-type="text">
        <canvas class="text-canvas" aria-hidden="true"></canvas>
        <textarea class="text-editor" spellcheck="false" wrap="soft"></textarea>
        <div class="selection-box" aria-hidden="true">
          <span class="handle rotate" data-handle="rotate"></span>
          <span class="handle nw" data-handle="nw"></span>
          <span class="handle ne" data-handle="ne"></span>
          <span class="handle sw" data-handle="sw"></span>
          <span class="handle se" data-handle="se"></span>
        </div>
      </div>
    </template>

    <template id="shapeTemplate">
      <div class="object shape-object" data-type="shape">
        <svg class="shape-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
        <div class="selection-box" aria-hidden="true">
          <span class="handle rotate" data-handle="rotate"></span>
          <span class="handle nw" data-handle="nw"></span>
          <span class="handle ne" data-handle="ne"></span>
          <span class="handle sw" data-handle="sw"></span>
          <span class="handle se" data-handle="se"></span>
        </div>
      </div>
    </template>

    <div id="statusText" class="status-toast" role="status" aria-live="polite"></div>

    <div id="projectLibrary" class="project-library" hidden>
      <section class="project-library-panel" aria-labelledby="project-library-title">
        <header class="project-library-header">
          <div>
            <h2 id="project-library-title">Projects</h2>
            <p>앱 내부에 자동 저장된 Simple Slide 프로젝트</p>
          </div>
          <button id="closeProjectLibrary" type="button">Close</button>
        </header>
        <div class="project-library-actions">
          <button id="libraryNewProject" type="button">New Project</button>
        </div>
        <div id="projectLibraryList" class="project-library-list"></div>
      </section>
    </div>

    <script src="./app.js?v=20260519-video-export" defer></script>
  </body>
</html>
