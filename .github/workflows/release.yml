name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to build, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release-macos:
    name: Build and publish macOS release
    runs-on: macos-15

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Validate release tag
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"

          if [[ "$REQUESTED_TAG" != "$EXPECTED_TAG" ]]; then
            echo "Release tag must match package.json version."
            echo "Requested tag: $REQUESTED_TAG"
            echo "Expected tag:  $EXPECTED_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$REQUESTED_TAG" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber
          else
            gh release create "$RELEASE_TAG" release/* \
              --title "Slide Cut $RELEASE_TAG" \
              --generate-notes
          fi
